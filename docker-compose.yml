services:
  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "19563:19563"
    volumes:
      - ./backend:/app
      - ./frontend:/app/static
    env_file:
      - backend/.env
    environment:
      - LOG_DB_PATH=/app/logs.db
      - LOG_LEVEL=INFO
    command: uvicorn main:app --host 0.0.0.0 --port 19563 --reload
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped
